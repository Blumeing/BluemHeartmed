{"id":"unit-5","code":1000,"title":"基本信息","rawName":"基本信息（民族、居住地址）","description":"包含患者的基本信息，如民族、居住地址","ocr":null,"category":"诊疗","image":"NA","metrics":[{"name":"民族","type":"下拉选择","options":["汉族","蒙古族","藏族","壮族","回族","苗族","彝族","满族"]},{"name":"居住地址","type":"单行文本","length":100}],"isYellow":true},

{"id":"unit-11","code":1006,"title":"病史采集","rawName":"病史采集（诊断、既往病史、家族史）","description":"","ocr":"有","category":"诊疗","image":"有","metrics":[{"name":"诊断","type":"多行文本"},{"name":"既往病史","type":"多行文本"},{"name":"家族史","type":"多行文本"}],"isYellow":true},
{"id":"unit-12","code":1007,"title":"用药史","rawName":"用药史（序号、药物名称、治疗疾病、单次剂量、给药频次、开始时间、结束时间、是否继续）","description":"","ocr":"有","category":"诊疗","image":"有","metrics":[{"name":"序号","type":"数值","length":3},{"name":"药物名称","type":"单行文本","length":50},{"name":"治疗疾病","type":"单行文本","length":50},{"name":"单次剂量","type":"数值","length":10},{"name":"给药频次","type":"下拉选择","options":["qd","bid","tid","qid"]},{"name":"开始时间","type":"日期选择"},{"name":"结束时间","type":"日期选择"},{"name":"是否继续","type":"单选","options":["是","否"]}],"isYellow":true},
{"id":"unit-18","code":2006,"title":"体温","rawName":"体温","description":"","ocr":null,"category":"体征","image":"NA","metrics":[{"name":"体温","type":"数值","length":5,"unit":"℃"}],"isYellow":true},
{"id":"unit-19","code":2007,"title":"氧饱和度","rawName":"氧饱和度","description":"","ocr":null,"category":"体征","image":"NA","metrics":[{"name":"氧饱和度","type":"数值","length":4,"unit":"%"}],"isYellow":true},

{"id":"unit-73","code":5007,"title":"严重不良事件","rawName":"严重不良事件（序号、SAE名称、SAE类型、SAE详细描述、符合SAE标准日期、严重程度、与试药药物关系、对试药药物采取措施、针对SAE采取的治疗措施、SAE转归、若死亡，死亡原因、若死亡，死亡日期、是否预期、揭盲情况、上报伦理委员会日期、上报申办方日期）","description":"","ocr":"有","category":"事件","image":"有","metrics":[{"name":"序号","type":"数值","length":3},{"name":"SAE名称","type":"单行文本","length":50},{"name":"SAE类型","type":"下拉选择","options":["导致死亡","危及生命","导致住院或住院时间延长","导致永久或显著残疾/功能丧失","导致先天异常/出生缺陷","其他重要医学事件"]},{"name":"SAE详细描述","type":"多行文本"},{"name":"符合SAE标准日期","type":"日期选择"},{"name":"严重程度","type":"下拉选择","options":["轻度","中度","重度"]},{"name":"与试药药物关系","type":"下拉选择","options":["肯定有关","很可能有关","可能有关","可能无关","肯定无关"]},{"name":"对试药药物采取措施","type":"下拉选择","options":["继续用药","暂停用药","永久停药"]},{"name":"针对SAE采取的治疗措施","type":"多行文本"},{"name":"SAE转归","type":"下拉选择","options":["痊愈","好转","未愈","死亡"]},{"name":"若死亡","type":"单选","options":["是","否"]},{"name":"死亡原因","type":"单行文本","length":50},{"name":"死亡日期","type":"日期选择"},{"name":"是否预期","type":"单选","options":["是","否"]},{"name":"揭盲情况","type":"下拉选择","options":["未揭盲","已揭盲"]},{"name":"上报伦理委员会日期","type":"日期选择"},{"name":"上报申办方日期","type":"日期选择"}],"isYellow":true}
];
const baseSections = [{"id": "unit-2", "code": 1, "title": "知情同意书", "rawName": "知情同意书", "description": "当前为图片，后续DCT实现电子知情同意", "ocr": null, "category": "合规", "image": "有", "metrics": [], "isYellow": false}, {"id": "unit-7", "code": 1002, "title": "入院记录", "rawName": "入院记录", "description": "出院病历的一部分，包含主诉、既往史和体格", "ocr": null, "category": "诊疗", "image": "有", "metrics": [], "isYellow": false}];
const state = { editingId: '' };
const tabNames = ['知情同意书','入院记录','手术记录','出院记录','血压','血糖','心率','身高体重','检验报告单','一般情况调查问卷','睡眠质量调查问卷','生活质量调查问卷'];
const patientNames = ['崔惠康','高希望','杨淑霞','李民强','王树堂','何志林','包存芳','李淑霞','张西安','刘建都','杨永辉'];
function escapeHtml(text){return String(text??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function renderPatients(){document.getElementById('patients').innerHTML=patientNames.map((name,i)=>`<div class="patient ${i===0?'active':''}"><div class="avatar">${name[0]}</div><div><div class="pname">${name}</div><div class="pmeta">${i%3===0?'女':'男'}　|　${76+i}岁</div></div><button class="group">${i%2?'对照组':'干预组'}</button></div>`).join('');}
function renderTabs(){document.getElementById('recordTabs').innerHTML=tabNames.map((name,i)=>`<span class="${i===0?'active':''}">${name}</span>`).join('');}
function allSections(){return [baseSections.find(u=>u.title==='知情同意书')||{id:'consent',title:'知情同意书',metrics:[],description:''}, ...yellowUnits, baseSections.find(u=>u.title==='入院记录')||{id:'admission',title:'入院记录',metrics:['入院日期','附件','入院原因','主诉','现病史','个人史','家族史','既往史'],description:''}].filter(Boolean);}
function metricName(m){return typeof m==='string'?m:m.name;}
function metricType(m){return typeof m==='string'?typeForMetricLegacy(m):(m.type||'单行文本');}
function typeForMetricLegacy(metric){if(/序号|剂量|次数|数量|时间|日期|年龄|评分|分值/.test(metric))return'数值';if(/病史|地址|原因|描述|情况|备注|诊断|主诉/.test(metric))return'多行文本';return'单行文本';}
function renderRepeatingTable(section){const metrics=section.metrics&&section.metrics.length?section.metrics:['名称','开始日期','结束日期'];return `<div class="body"><table class="metric-table"><thead><tr>${metrics.map(m=>`<th>${escapeHtml(metricName(m))}</th>`).join('')}</tr></thead><tbody><tr>${metrics.map(()=>'<td>--</td>').join('')}</tr><tr>${metrics.map(()=>'<td>--</td>').join('')}</tr></tbody></table></div>`;}
function renderView(section){const repeating=['合并用药','用药史','不良事件','严重不良事件','不良记录','严重不良记录'];if(repeating.includes(section.title))return renderRepeatingTable(section);if(section.title==='体温')return `<div class="body"><div class="view-row"><span class="label">体温:</span><span class="value">-- ℃</span></div></div>`;if(section.title==='氧饱和度')return `<div class="body"><div class="view-row"><span class="label">氧饱和度:</span><span class="value">-- %</span></div></div>`;const metrics=section.metrics&&section.metrics.length?section.metrics:[section.title];if(section.title==='入院记录'){return `<div class="body"><div class="view-row"><span class="label">入院日期:</span><span class="value">--</span></div><div class="view-row"><span class="label">附件:</span><span class="value">无附件</span></div><div class="view-row"><span class="label">入院原因:</span><span class="value">--</span></div><div class="view-row"><span class="label">主诉:</span><span class="value">--</span></div><div class="view-row"><span class="label">现病史:</span><span class="value">--</span></div></div>`;}return `<div class="body">${metrics.map(m=>`<div class="view-row"><span class="label">${escapeHtml(metricName(m))}:</span><span class="value">--</span></div>`).join('')}</div>`;}
function renderEditor(section){
const metrics=section.metrics&&section.metrics.length?section.metrics:[{name:'知情同意书',type:'单行文本'}];
return `<div class="body editor">${metrics.map(function(metric,i){
var t=metricType(metric);
var name=metricName(metric);
if(t==='单选'){var opts=metric.options||['是','否'];return `<div class="field"><label>${escapeHtml(name)} <span class="type-tag">单选</span>:</label><div class="radio-line">${opts.map(function(o){return `<label><input type="radio" name="${name}" disabled> ${o}</label>`;}).join('')}</div></div>`;}
if(t==='下拉选择'){var opts=metric.options||[];return `<div class="field"><label>${escapeHtml(name)} <span class="type-tag">下拉选择</span>:</label><select class="input" disabled>${opts.map(function(o){return `<option>${o}</option>`;}).join('')}</select></div>`;}
if(t==='多行文本')return `<div class="field"><label>${escapeHtml(name)} <span class="type-tag">多行文本</span>:</label><textarea class="textarea" placeholder="请输入" data-interaction="${t}"></textarea></div>`;
if(t==='日期选择')return `<div class="field"><label>${escapeHtml(name)} <span class="type-tag">日期</span>:</label><input type="date" class="input" data-interaction="${t}"></div>`;
if(t==='数值'){var len=metric.length||10;var unit=metric.unit||'';return `<div class="field"><label>${escapeHtml(name)} <span class="type-tag">数值(${len})</span>:</label><input type="number" class="input" placeholder="请输入数值" maxlength="${len}" data-interaction="${t}"><span class="unit">${unit}</span></div>`;}
var len=metric.length||50;return `<div class="field"><label>${escapeHtml(name)} <span class="type-tag">单行文本(${len})</span>:</label><input class="input" placeholder="请输入" maxlength="${len}" data-interaction="${t}"></div>`;
}).join('')}<div class="field"><label>附件:</label><div class="upload">☁ 点击上传，或将图片拖动到此区域，支持jpg、jpeg、png等格式</div></div><div class="actions"><button class="btn" data-save="${section.id}">保存</button><button class="btn secondary" data-cancel="${section.id}">取消</button></div></div>`;
}
function renderSection(section,index){var editing=state.editingId===section.id;return `<section class="section"><div class="section-head"><span class="section-title ${section.isYellow?'yellow':''}">${escapeHtml(section.title)}</span><span class="switch disabled"></span><span class="lock">🔒</span><span class="meta-line">上次编辑人/时间：${index===0?'海敏琪/2026-06-15 11:38:10':'--/--'}</span><button class="edit-link" data-edit="${section.id}">✎ 编辑</button></div>${editing?renderEditor(section):renderView(section)}</section>`;}
function renderCrf(){document.getElementById('crf').innerHTML=allSections().map(renderSection).join('');document.querySelectorAll('[data-edit]').forEach(function(btn){btn.onclick=function(){state.editingId=btn.dataset.edit;renderCrf();}});document.querySelectorAll('[data-cancel],[data-save]').forEach(function(btn){btn.onclick=function(){state.editingId='';renderCrf();}});}
renderPatients();renderTabs();renderCrf();</script>
